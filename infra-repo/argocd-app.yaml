apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yann-26/DevOps-Project-1.git
    targetRevision: main
    path: infra-repo
    directory:
      recurse: true
      exclude: "src/**/*" # 👈 Tells ArgoCD to completely skip the source code
  ignoreDifferences:
    - group: apiregistration.k8s.io
      kind: APIService
      name: v1beta1.metrics.k8s.io
      jsonPointers:
        - /spec/caBundle # 👈 Instructs ArgoCD to disregard the auto-generated bundle
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
