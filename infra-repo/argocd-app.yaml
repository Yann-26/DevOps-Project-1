apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yann-26/DevOps-Project-1.git
    targetRevision: main
    path: infra-repo
    directory:
      recurse: true
      exclude: 'src/**/*' # 👈 Tells ArgoCD to completely skip your source code
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true